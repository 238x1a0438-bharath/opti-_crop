erDiagram
    FARMER {
        int farmer_id PK
        string name
        string location
        string contact
    }

    FIELD {
        int field_id PK
        int farmer_id FK
        float area
        string soil_type
    }

    CROP {
        int crop_id PK
        string crop_name
        string season
    }

    WEATHER {
        int weather_id PK
        string temperature
        string rainfall
        string humidity
    }

    RECOMMENDATION {
        int recommendation_id PK
        int field_id FK
        int crop_id FK
        string fertilizer
        string irrigation
    }

    FARMER ||--o{ FIELD : owns
    FIELD ||--o{ RECOMMENDATION : receives
    CROP ||--o{ RECOMMENDATION : suggested_for
    WEATHER ||--o{ RECOMMENDATION : influences
